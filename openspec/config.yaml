# openspec/config.yaml — SDD Configuration for SkillMatch
schema: spec-driven

context: |
  Project: SkillMatch
  Phase: Phase 0 Project Foundation implemented and archived; ready for the next SDD change from the foundation baseline. All 11 ADRs accepted.
  Stack: Implemented Phase 0 foundation. Backend: Node.js/TypeScript/Fastify. Frontend: React/TypeScript/Vite. Database: PostgreSQL/Prisma planned behind infrastructure adapters. Monorepo: pnpm workspaces.
  Testing: Vitest installed for Phase 0. React Testing Library installed for frontend testing. Playwright remains planned for E2E.
  Architecture: Clean/Hexagonal modular monolith backend. Product-area-organized frontend. Ant Design via wrapper layer.
  Conventions: SDD workflow active per AGENTS.md. `specs/` is source of truth. All ADRs in `specs/adr/`.

strict_tdd: false
strict_tdd_reason: "Phase 0 uses verification gates and smoke coverage rather than strict TDD for every foundation file."

testing:
  runner: vitest
  runner_status: installed_in_phase_0
  layers:
    unit: "Domain/use-case tests — Vitest"
    integration: "API tests via Vitest + Fastify inject; Persistence via Vitest + Prisma + PostgreSQL"
    component: "Frontend component/workflow tests via Vitest + React Testing Library"
    e2e: "Playwright for critical complete journeys"
  coverage:
    available: true
    tool: vitest --coverage

quality:
  linter: "ESLint flat config (ADR 0011)"
  formatter: "Prettier (ADR 0011)"
  type_checker: "TypeScript (strict baseline per ADR 0005)"

rules:
  proposal:
    checks:
      - Must reference affected specs/ documents
      - Include rollback plan for risky changes
  specs:
    checks:
      - Use Given/When/Then for scenarios
      - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
      - Must reference existing specs/ for traceability
  design:
    checks:
      - Include sequence diagrams for complex flows
      - Must reference ADRs where relevant
      - Document architecture decisions with rationale
  tasks:
    checks:
      - Group by phase per 11-sdd-execution-plan.md
      - Keep tasks completable in one session
      - Use hierarchical numbering
  apply:
    checks:
      - Follow architecture per 09-architecture.md and relevant ADRs
      - Follow data model per 08-data-model.md
      - Follow API contract per 07-api-spec.md
      - Prefer maintainability over cleverness
    tdd: false
    test_command: "pnpm test"
  verify:
    checks:
      - Tests are behavior-focused per ADR 0005
      - Domain tests must pass before API tests
    test_command: "pnpm test"
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    checks:
      - Warn before merging destructive deltas
      - Preserve change folder at openspec/changes/archive/YYYY-MM-DD-{change-name}/
